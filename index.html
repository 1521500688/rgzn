<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线答题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .question-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .question-card:hover { transform: translateX(4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .question-card.active { border-left-color: #667eea; background: #f8fafc; }
        .option-label { transition: all 0.2s ease; cursor: pointer; }
        .option-label:hover { background: #e0e7ff; transform: translateX(4px); }
        .option-input:checked + .option-content { background: #4f46e5; color: white; border-color: #4f46e5; }
        .correct-answer { background: #dcfce7 !important; border-color: #16a34a !important; color: #166534 !important; }
        .wrong-answer { background: #fee2e2 !important; border-color: #dc2626 !important; color: #991b1b !important; }
        .missed-answer { background: #fef3c7 !important; border-color: #d97706 !important; color: #92400e !important; }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .scroll-indicator { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 50; }
        .nav-dot { transition: all 0.3s; width: 8px; height: 8px; }
        .nav-dot.active { width: 24px; border-radius: 12px; }
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
<base target="_blank">
</head>
<body class="p-4 md:p-8">

    <!-- Header Stats -->
    <div class="max-w-5xl mx-auto mb-6 no-print">
        <div class="glass-panel rounded-2xl p-6 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-1">在线答题系统</h1>
                    <p class="text-gray-500 text-sm">共 100 题 · 单选题 80 道 · 判断题 20 道</p>
                </div>
                <div class="flex gap-4 text-center">
                    <div class="bg-white rounded-xl p-3 shadow-md min-w-[80px]">
                        <div class="text-2xl font-bold text-indigo-600" id="answeredCount">0</div>
                        <div class="text-xs text-gray-500">已答</div>
                    </div>
                    <div class="bg-white rounded-xl p-3 shadow-md min-w-[80px]">
                        <div class="text-2xl font-bold text-gray-400" id="unansweredCount">100</div>
                        <div class="text-xs text-gray-500">未答</div>
                    </div>
                    <div class="bg-white rounded-xl p-3 shadow-md min-w-[80px]">
                        <div class="text-2xl font-bold text-orange-500" id="progressPercent">0%</div>
                        <div class="text-xs text-gray-500">进度</div>
                    </div>
                </div>
            </div>
            <div class="mt-4 bg-gray-200 rounded-full h-3 overflow-hidden">
                <div class="progress-bar bg-gradient-to-r from-indigo-500 to-purple-600 h-full rounded-full" id="progressBar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Timer -->
    <div class="max-w-5xl mx-auto mb-6 no-print">
        <div class="glass-panel rounded-xl p-4 shadow-lg flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="font-mono text-lg font-bold text-gray-700" id="timer">00:00:00</span>
            </div>
            <div class="flex gap-3">
                <button onclick="submitQuiz()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white px-6 py-2 rounded-lg font-medium shadow-lg transform hover:scale-105 transition-all">
                    提交答卷
                </button>
                <button onclick="resetQuiz()" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-medium shadow transition-all">
                    重置
                </button>
            </div>
        </div>
    </div>

    <!-- Questions Container -->
    <div class="max-w-5xl mx-auto space-y-4" id="questionsContainer"></div>

    <!-- Results Modal -->
    <div id="resultsModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass-panel rounded-2xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all scale-95 opacity-0" id="resultsContent">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full mx-auto flex items-center justify-center mb-4 shadow-lg">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">答题完成！</h2>
                <p class="text-gray-500">以下是您的答题情况分析</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card rounded-xl p-4 text-white text-center">
                    <div class="text-3xl font-bold" id="resultScore">0</div>
                    <div class="text-xs opacity-90">得分</div>
                </div>
                <div class="bg-green-500 rounded-xl p-4 text-white text-center">
                    <div class="text-3xl font-bold" id="resultCorrect">0</div>
                    <div class="text-xs opacity-90">正确</div>
                </div>
                <div class="bg-red-500 rounded-xl p-4 text-white text-center">
                    <div class="text-3xl font-bold" id="resultWrong">0</div>
                    <div class="text-xs opacity-90">错误</div>
                </div>
                <div class="bg-yellow-500 rounded-xl p-4 text-white text-center">
                    <div class="text-3xl font-bold" id="resultUnanswered">0</div>
                    <div class="text-xs opacity-90">未答</div>
                </div>
            </div>

            <div class="bg-gray-50 rounded-xl p-6 mb-6">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    答题详情
                </h3>
                <div id="wrongQuestionsList" class="space-y-2 max-h-60 overflow-y-auto"></div>
            </div>

            <div class="flex gap-3 justify-center">
                <button onclick="closeResults()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-3 rounded-xl font-medium transition-all">
                    继续查看
                </button>
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-medium transition-all">
                    打印报告
                </button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { type: 'single', q: "根据职业道德，对待同事的错误应该：", options: ["A. 嘲笑和指责", "B. 理解和帮助改正", "C. 公开讨论其错误让众人知道", "D. 利用错误来提升自己的地位"], answer: "B", id: 1 },
            { type: 'single', q: "下列哪项不是数据处理过程中可能遇到的数据一致性问题？", options: ["A. 不同数据源之间的数据存在冲突", "B. 数据在传输过程中被篡改", "C. 数据处理算法存在缺陷，导致数据错误", "D. 数据格式严格统一，不存在任何差异"], answer: "D", id: 2 },
            { type: 'single', q: "PowerPoint 中，如何快速切换到下一张幻灯片？", options: ["A. Page Down", "B. Alt + Right Arrow", "C. Alt + Down Arrow", "D. Alt + Left Arrow"], answer: "A", id: 3 },
            { type: 'single', q: "以下哪个指标可以用于衡量标注数据的准确性？（ ）", options: ["A. 准确率", "B. 召回率", "C. F1 值", "D. 以上都是"], answer: "D", id: 4 },
            { type: 'single', q: "智能系统数据维护过程中，删除历史数据应该（ ）。", options: ["A. 随意删除，不考虑后果", "B. 遵循一定的规则和流程，确保不会误删重要数据", "C. 一次性删除所有历史数据", "D. 不删除历史数据"], answer: "B", id: 5 },
            { type: 'single', q: "在 Excel 中，如何快速打开'查找和替换'功能？", options: ["A. Ctrl + F", "B. Ctrl + H", "C. Ctrl + D", "D. Ctrl + R"], answer: "A", id: 6 },
            { type: 'single', q: "《中华人民共和国劳动法》规定，女职工产假的时间为多少天？", options: ["A. 60 天", "B. 90 天", "C. 120 天", "D. 150 天"], answer: "B", id: 7 },
            { type: 'single', q: "在数据处理过程中，下列哪项操作有助于提高数据的可用性？", options: ["A. 使用复杂的数据查询语句以降低查询效率", "B. 忽略数据的清洗和预处理工作", "C. 制定详细的数据字典和元数据管理计划", "D. 不进行任何数据质量的评估和监控"], answer: "C", id: 8 },
            { type: 'single', q: "下列哪项是数据采集过程中，需要考虑的数据安全性措施？", options: ["A. 使用强密码和访问控制机制", "B. 忽略数据的加密处理", "C. 将数据存储在公共云存储服务上", "D. 不断追求数据的最大化存储而忽视安全性"], answer: "A", id: 9 },
            { type: 'single', q: "数据处理规范要求，对数据进行标注时，标注信息应（ ）。", options: ["A. 随意编写", "B. 准确、清晰且具有关联性", "C. 尽可能简短", "D. 全部使用大写字母"], answer: "B", id: 10 },
            { type: 'single', q: "在数据处理时，对数据进行平滑处理的作用是（ ）。", options: ["A. 使数据表面更光滑", "B. 减少数据的波动和噪声", "C. 改变数据的格式", "D. 使数据的存储容量变大"], answer: "B", id: 11 },
            { type: 'single', q: "安装智能系统前了解硬件资源需求可以（ ）。", options: ["A. 浪费时间", "B. 避免因硬件不足导致系统无法正常运行", "C. 增加硬件成本", "D. 降低系统性能"], answer: "B", id: 12 },
            { type: 'single', q: "人工智能训练师在处理数据时，数据标准化的目的是什么？", options: ["A. 使数据符合正态分布", "B. 消除数据特征之间的量纲影响", "C. 增加数据的可解释性", "D. 减少数据的规模"], answer: "B", id: 13 },
            { type: 'single', q: "若审核发现数据存在格式错误，应（ ）。", options: ["A. 按照正确格式进行转换", "B. 保留错误格式数据", "C. 随机修改数据格式", "D. 忽略格式错误"], answer: "A", id: 14 },
            { type: 'single', q: "智能系统数据维护中，数据压缩的主要目标是（ ）", options: ["A. 使数据更难理解", "B. 减少数据的存储空间占用", "C. 提高数据的安全性", "D. 加快数据的传输速度"], answer: "B", id: 15 },
            { type: 'single', q: "在定义字符型数据时，'VARCHAR' 和 'CHAR' 的主要区别在于（ ）。", options: ["A. 'VARCHAR' 可变长度，'CHAR' 固定长度", "B. 'VARCHAR' 固定长度，'CHAR' 可变长度", "C. 'VARCHAR' 只能存储字母，'CHAR' 能存储数字", "D. 'VARCHAR' 存储容量更大"], answer: "A", id: 16 },
            { type: 'single', q: "对于数据处理中的并行计算，优化建议是？", options: ["A. 不采用并行计算", "B. 合理分配计算任务，提高并行效率", "C. 随意分配并行任务", "D. 只进行串行计算"], answer: "B", id: 17 },
            { type: 'single', q: "在采集农业数据时，为使数据更具针对性，优化措施是（ ）。", options: ["A. 不考虑业务需求", "B. 明确农业业务需求，采集相关的、有针对性的数据", "C. 采集所有可能的数据", "D. 只采集部分数据"], answer: "B", id: 18 },
            { type: 'single', q: "数据审核过程中，对数据的格式进行审核，例如日期格式、数字格式等，目的是确保数据的？", options: ["A. 准确性", "B. 完整性", "C. 一致性", "D. 可读性"], answer: "C", id: 19 },
            { type: 'single', q: "在数据库的数据定义中，'ALTER TABLE' 语句用于（ ）。", options: ["A. 创建新表", "B. 删除表", "C. 修改表的结构", "D. 查询表中的数据"], answer: "C", id: 20 },
            { type: 'single', q: "在数据定义阶段，确定数据的精度和标度主要是为了？", options: ["A. 优化存储空间", "B. 保证数据的准确性", "C. 提高查询效率", "D. 满足特定的业务需求"], answer: "B", id: 21 },
            { type: 'single', q: "在计算机编程中，异常处理的主要用途是什么？", options: ["A. 优化代码性能", "B. 处理运行时错误和异常情况", "C. 增强程序的可读性", "D. 控制程序的执行流程"], answer: "B", id: 22 },
            { type: 'single', q: "若采集的教育数据存在格式不一致问题，优化方法是（ ）。", options: ["A. 不进行处理", "B. 制定统一的数据格式标准，对采集的数据进行转换", "C. 保留不同的格式", "D. 随机选择一种格式"], answer: "B", id: 23 },
            { type: 'single', q: "当智能系统的数据质量出现问题影响业务时，首先要做的是（ ）", options: ["A. 追究相关人员责任", "B. 对数据进行全面清洗", "C. 评估问题对业务的影响程度", "D. 升级系统软件"], answer: "C", id: 24 },
            { type: 'single', q: "为提高数据处理速度，对于数据存储，可建议？", options: ["A. 随意存储在不同磁盘", "B. 采用合适的数据存储格式和存储结构", "C. 只存储在内存中", "D. 不断增加存储设备"], answer: "B", id: 25 },
            { type: 'single', q: "语音标注中，标注的语言类型错误，影响了标注数据的（ ）", options: ["A. 准确性", "B. 完整性", "C. 规范性", "D. 一致性"], answer: "A", id: 26 },
            { type: 'single', q: "文本标注中，对于标注结果存在争议的样本，应（ ）", options: ["A. 按多数标注人员意见确定标签", "B. 请专家审核裁决", "C. 随机选一个标签", "D. 不做处理"], answer: "B", id: 27 },
            { type: 'single', q: "以下不属于聚类分析应用场景的是（ ）", options: ["A. 客户细分", "B. 图像分割", "C. 疾病诊断预测", "D. 基因序列分析"], answer: "C", id: 28 },
            { type: 'single', q: "下列哪项是数据定义中的复合数据类型？", options: ["A. 整数类型", "B. 浮点类型", "C. 结构体类型", "D. 字符串类型"], answer: "C", id: 29 },
            { type: 'single', q: "系统安装部署完成后，对系统进行初始化设置可以（ ）。", options: ["A. 让系统更复杂", "B. 使系统符合用户的使用习惯和业务需求", "C. 降低系统的性能", "D. 改变系统的版本号"], answer: "B", id: 30 },
            { type: 'single', q: "智能系统安装部署完成后，进行验收工作的主要依据是（ ）。", options: ["A. 个人喜好", "B. 安装合同和相关技术标准", "C. 安装人员的口头承诺", "D. 不需要验收"], answer: "B", id: 31 },
            { type: 'single', q: "下列哪项不是数据归类工具在处理数据时可能遇到的数据质量问题？", options: ["A. 数据缺失", "B. 数据格式不一致", "C. 分类规则过于简单", "D. 数据完全准确且无误"], answer: "D", id: 32 },
            { type: 'single', q: "在数据定义中，检查约束的主要作用是？", options: ["A. 保证表中数据的唯一性", "B. 限制表中数据的取值范围", "C. 提高数据的查询效率", "D. 保证数据的完整性"], answer: "B", id: 33 },
            { type: 'single', q: "根据《中华人民共和国劳动法》，劳动者因工负伤或者患职业病，经治疗后不能恢复工作的，用人单位应当如何处理？", options: ["A. 解除劳动合同并给予经济补偿", "B. 解除劳动合同但不给予经济补偿", "C. 继续履行劳动合同并调整工作岗位", "D. 继续履行劳动合同但降低工资待遇"], answer: "C", id: 34 },
            { type: 'single', q: "以下关于标注数据时效性的说法，正确的是（ ）", options: ["A. 标注数据的时效性不重要", "B. 标注数据应及时反映最新的情况和变化", "C. 标注数据的时效性只与数据的产生时间有关", "D. 标注数据一旦标注完成，时效性就不再变化"], answer: "B", id: 35 },
            { type: 'single', q: "视频标注数据的时效性检验主要关注（ ）", options: ["A. 标注数据是否反映视频内容的最新变化", "B. 标注数据的文件格式", "C. 标注数据的大小", "D. 标注数据的存储位置"], answer: "A", id: 36 },
            { type: 'single', q: "以下关于智能系统数据维护中数据迁移的说法，错误的是（ ）", options: ["A. 数据迁移前要进行充分的测试", "B. 数据迁移过程中无需监控", "C. 数据迁移后要进行数据验证", "D. 数据迁移要制定详细的计划"], answer: "B", id: 37 },
            { type: 'single', q: "定义整数类型的数据时，'INT' 一般用于（ ）数据库。", options: ["A. Oracle", "B. MySQL", "C. Access", "D. Excel"], answer: "B", id: 38 },
            { type: 'single', q: "以下哪项不属于标注数据质量检验的基本内容？", options: ["A. 检查标注的分类是否正确", "B. 查看标注数据的字体样式", "C. 审核标注的边界是否准确", "D. 验证标注的一致性"], answer: "B", id: 39 },
            { type: 'single', q: "回归分析在交通流量预测中的应用是（ ）", options: ["A. 分析天气状况、时间等因素与交通流量之间的关系，进行流量预测", "B. 预测交通事故的发生地点", "C. 评估交通信号灯的颜色", "D. 确定交通标志的大小"], answer: "A", id: 40 },
            { type: 'single', q: "人工智能训练师在构建聊天机器人时可能采用的技术是：", options: ["A. 图像识别", "B. 语音合成", "C. 自然语言处理", "D. 视频生成"], answer: "C", id: 41 },
            { type: 'single', q: "在 Word 中，如何插入超链接？", options: ["A. Ctrl + K", "B. Ctrl + H", "C. Ctrl + L", "D. Ctrl + J"], answer: "A", id: 42 },
            { type: 'single', q: "进行相关分析时，对数据的要求是（ ）", options: ["A. 数据必须是正态分布的", "B. 数据可以是任意分布的，但要满足一定的样本量", "C. 数据只能是分类数据", "D. 数据只能是顺序数据"], answer: "B", id: 43 },
            { type: 'single', q: "岭回归在普通最小二乘法的基础上，增加了一个（ ）", options: ["A. 惩罚项，以约束回归系数的大小", "B. 常数项，以提高模型的拟合优度", "C. 随机项，以增加模型的稳定性", "D. 变量项，以扩大模型的解释范围"], answer: "A", id: 44 },
            { type: 'single', q: "数据归类工具中，下列哪项功能有助于用户进行特征选择和工程？", options: ["A. 数据可视化功能", "B. 特征选择和工程功能", "C. 数据加密功能", "D. 数据导入和导出功能"], answer: "B", id: 45 },

        let userAnswers = {};
        let startTime = Date.now();
        let timerInterval;
        let submitted = false;

        function init() {
            renderQuestions();
            startTimer();
            updateProgress();
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = questions.map((q, index) => {
                const isTf = q.type === 'tf';
                return `
                <div class="question-card glass-panel rounded-xl p-6 shadow-md" id="q-${index}">
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white font-bold shadow-md">
                            ${q.id}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-semibold px-2 py-1 rounded-full ${isTf ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}">
                                    ${isTf ? '判断题' : '单选题'}
                                </span>
                                <span class="text-xs text-gray-400">第 ${q.id} 题</span>
                            </div>
                            <h3 class="text-lg font-medium text-gray-800 mb-4 leading-relaxed">${q.q}</h3>
                            <div class="space-y-2">
                                ${q.options.map((opt, optIndex) => {
                                    const value = isTf ? opt : opt.charAt(0);
                                    const label = isTf ? (opt === 'T' ? '正确 (True)' : '错误 (False)') : opt;
                                    return `
                                    <label class="option-label flex items-center p-3 rounded-lg border border-gray-200 bg-white group">
                                        <input type="radio" name="q${index}" value="${value}" 
                                            onchange="selectAnswer(${index}, '${value}')"
                                            class="option-input hidden">
                                        <div class="option-content w-full flex items-center gap-3 rounded-lg p-2 transition-all border border-transparent">
                                            <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center group-hover:border-indigo-400 transition-colors">
                                                <div class="w-3 h-3 rounded-full bg-indigo-600 opacity-0 transition-opacity radio-dot"></div>
                                            </div>
                                            <span class="text-gray-700 font-medium">${label}</span>
                                        </div>
                                    </label>
                                    `;
                                }).join('')}
                            </div>
                            <div class="answer-feedback mt-3 hidden rounded-lg p-3 text-sm font-medium" id="feedback-${index}"></div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            
            // Add click handlers for radio dots visualization
            document.querySelectorAll('.option-label').forEach(label => {
                label.addEventListener('click', function() {
                    const radio = this.querySelector('input[type="radio"]');
                    if (radio && !submitted) {
                        radio.checked = true;
                        radio.dispatchEvent(new Event('change'));
                        // Update visual dots
                        const card = this.closest('.question-card');
                        card.querySelectorAll('.radio-dot').forEach(d => d.style.opacity = '0');
                        this.querySelector('.radio-dot').style.opacity = '1';
                    }
                });
            });
        }

        function selectAnswer(qIndex, value) {
            if (submitted) return;
            userAnswers[qIndex] = value;
            updateProgress();
            
            // Visual feedback
            const card = document.getElementById(`q-${qIndex}`);
            card.classList.add('active');
        }

        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const total = questions.length;
            const percent = Math.round((answered / total) * 100);
            
            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('unansweredCount').textContent = total - answered;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const hours = Math.floor(elapsed / 3600).toString().padStart(2, '0');
                const minutes = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${hours}:${minutes}:${seconds}`;
            }, 1000);
        }

        function submitQuiz() {
            const answered = Object.keys(userAnswers).length;
            const unanswered = questions.length - answered;
            
            if (unanswered > 0) {
                const confirmSubmit = confirm(`您还有 ${unanswered} 道题未作答，确定要提交吗？`);
                if (!confirmSubmit) return;
            }
            
            submitted = true;
            clearInterval(timerInterval);
            
            let correct = 0;
            let wrong = 0;
            const wrongList = [];
            
            questions.forEach((q, index) => {
                const userAns = userAnswers[index];
                const isCorrect = userAns === q.answer;
                const card = document.getElementById(`q-${index}`);
                const feedback = document.getElementById(`feedback-${index}`);
                
                // Highlight options
                const options = card.querySelectorAll('.option-label');
                options.forEach(opt => {
                    const input = opt.querySelector('input');
                    const val = input.value;
                    
                    opt.classList.remove('correct-answer', 'wrong-answer', 'missed-answer');
                    
                    if (val === q.answer) {
                        opt.classList.add('correct-answer');
                    } else if (userAns === val && !isCorrect) {
                        opt.classList.add('wrong-answer');
                    }
                });
                
                // Show feedback
                feedback.classList.remove('hidden');
                if (isCorrect) {
                    correct++;
                    feedback.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                    const correctOpt = q.options.find(o => o.charAt(0) === q.answer);
                    feedback.innerHTML = `<span class="flex items-center gap-2">✓ 回答正确！<br>正确答案：${q.answer}. ${correctOpt ? correctOpt.substring(2) : q.answer}</span>`;
                } else if (!userAns) {
                    wrongList.push({id: q.id, q: q.q, user: '未作答', correct: q.answer, options: q.options, type: q.type});
                    feedback.classList.add('bg-yellow-50', 'text-yellow-700', 'border', 'border-yellow-200');
                    const correctOptUn = q.options.find(o => o.charAt(0) === q.answer);
                    feedback.innerHTML = `<span class="flex items-center gap-2">⚠ 未作答。<br>正确答案：${q.answer}. ${correctOptUn ? correctOptUn.substring(2) : q.answer}</span>`;
                } else {
                    wrong++;
                    wrongList.push({id: q.id, q: q.q, user: userAns, correct: q.answer, options: q.options, type: q.type});
                    feedback.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                    const correctOptWr = q.options.find(o => o.charAt(0) === q.answer);
                    const userOpt = q.options.find(o => o.charAt(0) === userAns);
                    feedback.innerHTML = `<span class="flex items-center gap-2">✗ 回答错误。<br>您的答案：${userAns}. ${userOpt ? userOpt.substring(2) : userAns}<br>正确答案：${q.answer}. ${correctOptWr ? correctOptWr.substring(2) : q.answer}</span>`;
                }
            });
            
            // Scroll to top
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            // Show results modal
            showResults(correct, wrong, questions.length - answered - wrong, wrongList);
        }

        function showResults(correct, wrong, unanswered, wrongList) {
            const modal = document.getElementById('resultsModal');
            const content = document.getElementById('resultsContent');
            
            document.getElementById('resultScore').textContent = correct;
            document.getElementById('resultCorrect').textContent = correct;
            document.getElementById('resultWrong').textContent = wrong + unanswered;
            document.getElementById('resultUnanswered').textContent = unanswered;
            
            const listContainer = document.getElementById('wrongQuestionsList');
            if (wrongList.length === 0) {
                listContainer.innerHTML = '<div class="text-green-600 font-medium text-center py-4">恭喜！全部回答正确！</div>';
            } else {
                listContainer.innerHTML = wrongList.map(item => {
                    const isTf = item.type === 'tf';
                    let optionsHtml = '';

                    if (isTf) {
                        // 判断题显示
                        const userText = item.user === 'T' ? '正确 (True)' : (item.user === 'F' ? '错误 (False)' : '未作答');
                        const correctText = item.correct === 'T' ? '正确 (True)' : '错误 (False)';
                        optionsHtml = `
                            <div class="mt-2 space-y-1 text-xs">
                                <div class="p-1.5 rounded ${item.correct === 'T' ? 'bg-green-50 text-green-700 border border-green-200' : 'text-gray-600'}">
                                    <span class="font-bold">T.</span> 正确 (True) ${item.correct === 'T' ? ' ✓ 正确答案' : ''}
                                </div>
                                <div class="p-1.5 rounded ${item.correct === 'F' ? 'bg-green-50 text-green-700 border border-green-200' : 'text-gray-600'}">
                                    <span class="font-bold">F.</span> 错误 (False) ${item.correct === 'F' ? ' ✓ 正确答案' : ''}
                                </div>
                            </div>
                            <div class="mt-2 text-xs">
                                <span class="text-red-600 font-medium">您的答案：${userText}</span>
                                <span class="mx-2 text-gray-400">|</span>
                                <span class="text-green-600 font-medium">正确答案：${correctText}</span>
                            </div>
                        `;
                    } else {
                        // 单选题显示所有选项
                        const userLetter = item.user !== '未作答' ? item.user : null;
                        optionsHtml = `
                            <div class="mt-2 space-y-1 text-xs">
                                ${item.options.map(opt => {
                                    const letter = opt.charAt(0);
                                    const isCorrect = letter === item.correct;
                                    const isUserWrong = userLetter && letter === userLetter && userLetter !== item.correct;
                                    return `
                                        <div class="p-1.5 rounded ${isCorrect ? 'bg-green-50 text-green-700 border border-green-200' : (isUserWrong ? 'bg-red-50 text-red-700 border border-red-200' : 'text-gray-600')}">
                                            <span class="font-bold">${letter}.</span> ${opt.substring(2)} 
                                            ${isCorrect ? '<span class="text-green-600 font-bold">✓ 正确答案</span>' : ''}
                                            ${isUserWrong ? '<span class="text-red-600 font-bold">✗ 您的选择</span>' : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            <div class="mt-2 text-xs">
                                <span class="text-red-600 font-medium">您的答案：${item.user}</span>
                                <span class="mx-2 text-gray-400">|</span>
                                <span class="text-green-600 font-medium">正确答案：${item.correct}</span>
                            </div>
                        `;
                    }

                    return `
                    <div class="flex items-start gap-3 bg-white rounded-lg p-4 border border-gray-200 shadow-sm">
                        <span class="flex-shrink-0 w-8 h-8 bg-gradient-to-br from-red-100 to-red-200 text-red-700 rounded-lg flex items-center justify-center text-sm font-bold">${item.id}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-medium text-gray-800 mb-2">${item.q}</div>
                            ${optionsHtml}
                        </div>
                    </div>
                `}).join('');
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeResults() {
            const modal = document.getElementById('resultsModal');
            const content = document.getElementById('resultsContent');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function resetQuiz() {
            if (confirm('确定要重置所有答题进度吗？')) {
                location.reload();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                submitQuiz();
            }
        });

        // Initialize
        init();
    </script>
</body>
</html>
